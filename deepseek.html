        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 2px solid #f5c842;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f5c842, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .header p {
            color: #aaa;
            font-size: 1.1rem;
            margin-top: 5px;
        }
        .header .redbull-badge {
            display: inline-block;
            background: #1a2a3a;
            color: #f5c842;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid #f5c842;
            margin-top: 10px;
        }

        /* ===== ISKANJE ===== */
        .search-wrap {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-wrap input {
            flex: 1;
            min-width: 220px;
            padding: 14px 22px;
            border-radius: 40px;
            border: 1px solid #2a3a5e;
            background: #16213e;
            color: #fff;
            font-size: 1.05rem;
            outline: none;
            transition: border 0.3s;
        }
        .search-wrap input:focus {
            border-color: #f5c842;
        }
        .search-wrap input::placeholder {
            color: #777;
        }
        .search-wrap .filter-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .search-wrap .filter-btns button {
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid #2a3a5e;
            background: transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.25s;
        }
        .search-wrap .filter-btns button:hover,
        .search-wrap .filter-btns button.active {
            background: #f5c842;
            color: #0d0d1a;
            border-color: #f5c842;
            font-weight: 600;
        }

        /* ===== RED BULL POSEBNI RAZDELEK ===== */
        .redbull-section {
            background: linear-gradient(145deg, #1a1a2e, #0f1a2a);
            border: 2px solid #f5c842;
            border-radius: 24px;
            padding: 25px 20px;
            margin-bottom: 40px;
            box-shadow: 0 0 40px rgba(245, 200, 66, 0.08);
        }
        .redbull-section h2 {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f5c842;
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a3a5e;
            padding-bottom: 12px;
        }
        .redbull-section h2 span {
            font-size: 2rem;
        }
        .redbull-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* ===== KARTICE ===== */
        .item {
            background: #16213e;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.3s;
            border: 1px solid #2a3a5e;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
        }
        .item img {
            width: 100%;
            max-height: 160px;
            object-fit: contain;
            border-radius: 12px;
            background: #0f0f1f;
            padding: 6px;
            margin-bottom: 10px;
        }
        .item .name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin: 4px 0 2px;
        }
        .item .desc {
            font-size: 0.78rem;
            color: #999;
            margin: 2px 0 6px;
            line-height: 1.3;
            max-height: 36px;
            overflow: hidden;
        }
        .item .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #4ecdc4;
            margin: 6px 0;
        }
        .item .category-tag {
            font-size: 0.7rem;
            color: #aaa;
            background: #2a3a5e;
            padding: 3px 14px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
        }
        /* Red Bull posebna kartica */
        .item.redbull {
            border: 2px solid #f5c842;
            background: #1a1a2e;
            position: relative;
        }
        .item.redbull::after {
            content: "⚡ RED BULL";
            position: absolute;
            top: 8px;
            right: 8px;
            background: #f5c842;
            color: #0d0d1a;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .item.redbull .price {
            color: #f5c842;
        }

        .section-title {
            font-size: 1.8rem;
            color: #f5c842;
            margin: 35px 0 18px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a3a5e;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px;
        }

        .no-results {
            text-align: center;
            color: #888;
            font-size: 1.3rem;
            padding: 40px 0;
            display: none;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.1rem;
            }
            .redbull-section h2 {
                font-size: 1.4rem;
            }
            .grid,
            .redbull-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .item img {
                max-height: 120px;
            }
        }
    </style>
