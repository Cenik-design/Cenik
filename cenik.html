<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XY Kavarna Cenik</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0d0d0d, #1a1a1a);
  color: #fff;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 16px;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
  color: #ff2d2d;
  letter-spacing: 1px;
}

.section {
  margin-top: 25px;
}

.section h2 {
  font-size: 18px;
  margin-bottom: 10px;
  border-left: 3px solid #ff2d2d;
  padding-left: 8px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card.highlight {
  border: 1px solid #ff2d2d;
  box-shadow: 0 0 15px rgba(255,0,0,0.2);
}

.left {
  display: flex;
  align-items: center;
}

.left img {
  width: 50px;
  margin-right: 10px;
}

.name {
  font-weight: bold;
}

.desc {
  font-size: 12px;
  opacity: 0.6;
}

.price {
  font-weight: bold;
  color: #ffcc00;
}

.badge {
  font-size: 10px;
  background: #ff2d2d;
  padding: 3px 6px;
  border-radius: 6px;
  margin-left: 5px;
}
</style>
</head>

<body>

<div class="container">
  <h1>XY KAVARNA</h1>

  <div class="section">
    <h2>🔥 Red Bull Izpostavljeno</h2>

    <div class="card highlight">
      <div class="left">
        <img src="redbull-original.png">
        <div>
          <div class="name">Red Bull <span class="badge">TOP</span></div>
          <div class="desc">Original / Sugarfree / Okus</div>
        </div>
      </div>
      <div class="price">3.00€</div>
    </div>

    <div class="card">
      <div class="left">
        <img src="redbull-zero.png">
        <div class="name">Red Bull Zero</div>
      </div>
      <div class="price">3.00€</div>
    </div>

    <div class="card">
      <div class="left">
        <img src="redbull-peach.png">
        <div class="name">Red Bull Peach Edition</div>
      </div>
      <div class="price">3.00€</div>
    </div>
  </div>

  <div class="section">
    <h2>⭐ Najboljša izbira</h2>

    <div class="card highlight">
      <div class="left">
        <img src="redbull-original.png">
        <div class="name">Red Bull</div>
      </div>
      <div class="price">3.50€</div>
    </div>

    <div class="card">
      <div class="name">Kava + Cedevita</div>
      <div class="price">3.90€</div>
    </div>

    <div class="card highlight">
      <div class="left">
        <img src="redbull-original.png">
        <div class="name">2x Vodka Red Bull</div>
      </div>
      <div class="price">7.90€</div>
    </div>

  </div>

</div>

</body>
</html>
